<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI im Deutsch-Unterricht: Ideen für telli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        .filter-btn.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .filter-btn { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-extrabold text-slate-900">KI im Unterricht</h1>
            <p class="mt-2 text-sm text-slate-500">Praxisbeispiele und Prompts für den Einsatz von telli</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        <section class="mb-10 bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-slate-800">Filter</h2>
                <button id="reset-filters" class="text-sm text-blue-600 hover:text-blue-800 font-medium underline">Alle Filter zurücksetzen</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <h3 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Fach</h3>
                    <div class="flex flex-wrap gap-2" id="filter-subject-container"></div>
                </div>
                <div>
                    <h3 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Telli-Ebene</h3>
                    <div class="flex flex-wrap gap-2" id="filter-type-container"></div>
                </div>
                <div>
                    <h3 class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Stufe(n)</h3>
                    <div class="flex flex-wrap gap-2" id="filter-level-container"></div>
                </div>
            </div>
            
            <div class="mt-6 pt-4 border-t border-slate-100 text-right">
                <span id="result-count" class="text-sm text-slate-500 font-medium">Suche Datei...</span>
            </div>
        </section>

        <!-- Status & Fehleranzeige -->
        <div id="status-message" class="hidden my-10 p-6 bg-white rounded-xl border-2 border-dashed border-slate-300 text-center">
            <div id="status-text" class="text-slate-600"></div>
        </div>

        <section id="cards-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- Karten werden hier eingefügt -->
        </section>
    </main>

    <script>
        let promptsData = [];
        let activeFilters = { subjects: new Set(), types: new Set(), levels: new Set() };

        const typeColors = {
            "Prompt": "bg-indigo-100 text-indigo-800 border-indigo-200",
            "Assistent": "bg-emerald-100 text-emerald-800 border-emerald-200",
            "Lernszenario": "bg-amber-100 text-amber-800 border-amber-200",
            "Dialogpartner": "bg-rose-100 text-rose-800 border-rose-200",
            "Bildgenerierung": "bg-cyan-100 text-cyan-800 border-cyan-200"
        };

        function showStatus(msg, isError = false) {
            const statusBox = document.getElementById('status-message');
            const statusText = document.getElementById('status-text');
            statusBox.classList.remove('hidden');
            statusText.innerHTML = msg;
            if (isError) statusText.classList.add('text-red-600');
        }

        async function loadPromptsData() {
            try {
                // Bei GitHub Pages ist Cache-Busting manchmal hilfreich
                const response = await fetch('prompts.md?v=' + new Date().getTime());
                
                if (!response.ok) {
                    throw new Error(`Datei 'prompts.md' nicht gefunden (Status: ${response.status}).`);
                }

                const text = await response.text();
                // Verbesserte Regex für Blöcke (erlaubt auch Leerzeichen um die Trennstriche)
                const blocks = text.split(/\r?\n\s*---\s*\r?\n/);
                const parsedData = [];

                blocks.forEach(block => {
                    if (!block.trim()) return;

                    // Regex verbessert: Erlaubt optionalen Whitespace nach den Doppelpunkten
                    const titleMatch = block.match(/^#\s+(#\d+)\s+(.+)$/m);
                    const subjectMatch = block.match(/\*\*Fach:\*\*\s*(.+)/i);
                    const typeMatch = block.match(/\*\*Telli-Ebene:\*\*\s*(.+)/i);
                    const levelsMatch = block.match(/\*\*Stufen?:\*\*\s*(.+)/i);
                    const descMatch = block.match(/\*\*Beschreibung:\*\*\s*(.+)/i);

                    // Falls Titel und Typ da sind, nehmen wir den Eintrag auf
                    if (titleMatch && typeMatch) {
                        const id = titleMatch[1];
                        const title = titleMatch[2];
                        const subject = subjectMatch ? subjectMatch[1].trim() : "Deutsch";
                        const type = typeMatch[1].trim();
                        const levelsArr = levelsMatch ? levelsMatch[1].split(',').map(s => s.trim()) : ["Nicht angegeben"];
                        const desc = descMatch ? descMatch[1].trim() : "";
                        
                        // Extrahiere den Prompt-Content (alles nach der Beschreibung)
                        const descRegex = /\*\*Beschreibung:\*\*.*?\r?\n/i;
                        const contentSplit = block.split(descRegex);
                        let rawContent = contentSplit.length > 1 ? contentSplit[1].trim() : "";
                        
                        let contentHtml = rawContent
                            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                            .replace(/\n/g, '<br>');

                        parsedData.push({ id, title, subject, type, levels: levelsArr, desc, content: contentHtml });
                    }
                });

                if (parsedData.length === 0) {
                    showStatus("Die Datei 'prompts.md' wurde geladen, aber das Format passt nicht. Überprüfe, ob die Datei korrekt mit # #1 Titel beginnt.");
                } else {
                    document.getElementById('status-message').classList.add('hidden');
                }

                return parsedData;

            } catch (error) {
                console.error("Ladefehler:", error);
                showStatus(`<strong>Fehler:</strong> ${error.message}`, true);
                return [];
            }
        }

        function toggleFilter(category, value, buttonEl) {
            if (activeFilters[category].has(value)) {
                activeFilters[category].delete(value);
                buttonEl.classList.remove('active');
            } else {
                activeFilters[category].add(value);
                buttonEl.classList.add('active');
            }
            renderCards();
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = "bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition hover:shadow-md";
            const typeBadgeColor = typeColors[item.type] || "bg-gray-100 text-gray-800 border-gray-200";
            
            card.innerHTML = `
                <div class="p-6 flex-grow">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-purple-100 text-purple-800 border border-purple-200">${item.subject}</span>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${typeBadgeColor} border">${item.type}</span>
                        ${item.levels.map(l => `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600 border border-slate-200">${l}</span>`).join('')}
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2 leading-tight"><span class="text-blue-600">${item.id}</span> ${item.title}</h3>
                    <p class="text-slate-600 text-sm mb-4 leading-relaxed">${item.desc}</p>
                </div>
                <details class="group border-t border-slate-100">
                    <summary class="flex items-center justify-between cursor-pointer p-4 bg-slate-50 hover:bg-slate-100 transition-colors text-sm font-medium text-blue-600 select-none">
                        <span>Details / Prompttext anzeigen</span>
                        <svg class="w-5 h-5 text-blue-500 transform group-open:rotate-180 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </summary>
                    <div class="p-5 bg-white border-t border-slate-100 text-sm text-slate-700 leading-relaxed">${item.content}</div>
                </details>
            `;
            return card;
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            const filtered = promptsData.filter(item => {
                const sMatch = activeFilters.subjects.size === 0 || activeFilters.subjects.has(item.subject);
                const tMatch = activeFilters.types.size === 0 || activeFilters.types.has(item.type);
                const lMatch = activeFilters.levels.size === 0 || item.levels.some(l => activeFilters.levels.has(l));
                return sMatch && tMatch && lMatch;
            });

            filtered.forEach(item => container.appendChild(createCard(item)));
            document.getElementById('result-count').textContent = `Zeige ${filtered.length} von ${promptsData.length} Einträgen`;
        }

        async function init() {
            promptsData = await loadPromptsData();
            if (promptsData.length === 0) return;

            const subjects = [...new Set(promptsData.map(i => i.subject))].sort();
            const types = [...new Set(promptsData.map(i => i.type))].sort();
            const levels = [...new Set(promptsData.flatMap(i => i.levels))].sort();

            const createBtn = (val, cat, cont) => {
                const btn = document.createElement('button');
                btn.className = "filter-btn px-3 py-1.5 rounded-full border border-slate-300 text-xs font-medium text-slate-700 hover:bg-slate-100";
                btn.textContent = val;
                btn.onclick = () => toggleFilter(cat, val, btn);
                cont.appendChild(btn);
            };

            subjects.forEach(s => createBtn(s, 'subjects', document.getElementById('filter-subject-container')));
            types.forEach(t => createBtn(t, 'types', document.getElementById('filter-type-container')));
            levels.forEach(l => createBtn(l, 'levels', document.getElementById('filter-level-container')));

            document.getElementById('reset-filters').onclick = () => {
                activeFilters.subjects.clear(); activeFilters.types.clear(); activeFilters.levels.clear();
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                renderCards();
            };

            renderCards();
        }

        init();
    </script>
</body>
</html>
